services:
  caddy:
    restart: unless-stopped
    image: caddy:2.8-alpine
    container_name: stocktracker-caddy
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST:-localhost}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      mobile-api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"

  postgres:
    restart: unless-stopped
    image: postgres:16-alpine
    container_name: stocktracker-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stocktracker}
      POSTGRES_USER: ${POSTGRES_USER:-stocktracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stocktracker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stocktracker} -d ${POSTGRES_DB:-stocktracker}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    restart: unless-stopped
    image: redis:7-alpine
    container_name: stocktracker-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    restart: unless-stopped
    image: clickhouse/clickhouse-server:24.8
    container_name: stocktracker-clickhouse
    environment:
      CLICKHOUSE_DB: stocktracker
      CLICKHOUSE_USER: stocktracker
      CLICKHOUSE_PASSWORD: stocktracker
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q 'Ok.'"]
      interval: 10s
      timeout: 5s
      retries: 10

  quotes-service:
    restart: unless-stopped
    build:
      context: .
      dockerfile: quotes-service/Dockerfile
    container_name: stocktracker-quotes-service
    environment:
      HTTP_ADDR: ":8080"
      QUOTES_SOURCE: /app/sample-quotes.txt
      SOURCE_NAME: mock-driver
      POLL_INTERVAL: 500ms
      QUOTE_HISTORY_LIMIT: 10
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_STREAM: ${REDIS_STREAM:-stocktracker.quotes}
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-quotes:latest:}
      CLICKHOUSE_ENDPOINT: ${CLICKHOUSE_ENDPOINT:-http://clickhouse:8123}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-stocktracker}
      CLICKHOUSE_USERNAME: ${CLICKHOUSE_USERNAME:-stocktracker}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-stocktracker}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-otel-collector:4317}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-quotes-service}
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health | grep -q '\"source_status\":\"available\"'"]
      interval: 10s
      timeout: 5s
      retries: 5

  portfolio-service:
    restart: unless-stopped
    build:
      context: .
      dockerfile: mobile-backend/Dockerfile
    container_name: stocktracker-portfolio-service
    environment:
      PORT: 8080
      SERVICE_NAME: portfolio-service
      APP_ENV: ${APP_ENV:-docker}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-stocktracker}?user=${POSTGRES_USER:-stocktracker}&password=${POSTGRES_PASSWORD:-stocktracker}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_ISSUER: ${JWT_ISSUER:-stock-tracker}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-stock-tracker-mobile}
      JWT_REALM: ${JWT_REALM:-stock-tracker}
      QUOTES_SERVICE_BASE_URL: ${QUOTES_SERVICE_BASE_URL:-http://quotes-service:8080}
      QUOTES_SERVICE_CURRENCY: ${QUOTES_SERVICE_CURRENCY:-USD}
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_STREAM_PREFIX: ${REDIS_STREAM_PREFIX:-stocktracker}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      quotes-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  mobile-api:
    restart: unless-stopped
    build:
      context: .
      dockerfile: mobile-api/Dockerfile
    container_name: stocktracker-mobile-api
    environment:
      PORT: 8081
      APP_ENV: ${APP_ENV:-docker}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PORTFOLIO_SERVICE_BASE_URL: http://portfolio-service:8080
      QUOTES_SERVICE_BASE_URL: http://quotes-service:8080
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
    depends_on:
      portfolio-service:
        condition: service_healthy
      quotes-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  otel-collector:
    restart: unless-stopped
    image: otel/opentelemetry-collector-contrib:0.108.0
    container_name: stocktracker-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./deploy/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro

  loki:
    restart: unless-stopped
    image: grafana/loki:3.1.1
    container_name: stocktracker-loki
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - ./deploy/loki/config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:3100:3100"

  tempo:
    restart: unless-stopped
    image: grafana/tempo:2.6.1
    container_name: stocktracker-tempo
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./deploy/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
    ports:
      - "127.0.0.1:3200:3200"

  prometheus:
    restart: unless-stopped
    image: prom/prometheus:v2.54.1
    container_name: stocktracker-prometheus
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"

  grafana:
    restart: unless-stopped
    image: grafana/grafana:11.2.0
    container_name: stocktracker-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./deploy/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
  clickhouse_data:
  loki_data:
  prometheus_data:
  grafana_data:
