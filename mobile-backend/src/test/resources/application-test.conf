ktor {
  deployment {
    port = 0
  }

  application {
    modules = [ com.example.stocktracker.bootstrap.ApplicationModuleKt.module ]
  }
}

app {
  env = "test"
  serviceName = "mobile-backend-test"

  logging {
    level = "DEBUG"
  }

  jwt {
    secret = "test-secret-key"
    issuer = "stock-tracker-test"
    audience = "stock-tracker-mobile"
    realm = "stock-tracker-test"
    accessTokenTtlMinutes = 60
  }

  database {
    jdbcUrl = "jdbc:postgresql://localhost:5432/stock_tracker_test"
    driverClassName = "org.postgresql.Driver"
    maxPoolSize = 2
    autoCommit = false
    connectionTimeoutMs = 5000
    validationTimeoutMs = 2000
  }
}
