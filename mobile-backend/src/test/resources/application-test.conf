ktor {
  deployment {
    port = 0
  }

  application {
    modules = [ com.example.stocktracker.bootstrap.ApplicationModuleKt.module ]
  }
}

app {
  env = "test"

  logging {
    level = "DEBUG"
  }

  database {
    jdbcUrl = "jdbc:postgresql://localhost:5432/stock_tracker_test"
    driverClassName = "org.postgresql.Driver"
    maxPoolSize = 2
    autoCommit = false
    connectionTimeoutMs = 5000
    validationTimeoutMs = 2000
  }
}
