ktor {
  deployment {
    port = 8080
    watch = [ classes ]
  }

  application {
    modules = [ com.example.stocktracker.bootstrap.ApplicationModuleKt.module ]
  }
}

app {
  env = ${?APP_ENV}
  serviceName = "mobile-backend"

  logging {
    level = ${?LOG_LEVEL}
  }

  jwt {
    secret = ${?JWT_SECRET}
    issuer = ${?JWT_ISSUER}
    audience = ${?JWT_AUDIENCE}
    realm = ${?JWT_REALM}
    accessTokenTtlMinutes = 120
  }

  database {
    jdbcUrl = ${?DATABASE_URL}
    driverClassName = "org.postgresql.Driver"
    maxPoolSize = 10
    autoCommit = false
    connectionTimeoutMs = 30000
    validationTimeoutMs = 5000
  }
}
