ktor {
  deployment {
    port = 8080
    port = ${?PORT}
    watch = [ classes ]
  }

  application {
    modules = [ com.example.stocktracker.bootstrap.ApplicationModuleKt.module ]
  }
}

app {
  env = ${?APP_ENV}
  serviceName = "portfolio-service"
  serviceName = ${?SERVICE_NAME}

  logging {
    level = ${?LOG_LEVEL}
  }

  jwt {
    secret = ${?JWT_SECRET}
    issuer = ${?JWT_ISSUER}
    audience = ${?JWT_AUDIENCE}
    realm = ${?JWT_REALM}
    accessTokenTtlMinutes = 120
  }

  observability {
    tracingEnabled = true
    serviceName = "mobile-backend"
    otlpEndpoint = ${?OTEL_EXPORTER_OTLP_ENDPOINT}
  }

  messaging {
    enabled = ${?REDIS_ENABLED}
    redisUrl = ${?REDIS_URL}
    streamPrefix = ${?REDIS_STREAM_PREFIX}
  }

  marketData {
    baseUrl = ${?QUOTES_SERVICE_BASE_URL}
    quoteCurrency = ${?QUOTES_SERVICE_CURRENCY}
    timeoutMs = 3000
  }

  database {
    jdbcUrl = ${?DATABASE_URL}
    driverClassName = "org.postgresql.Driver"
    maxPoolSize = 10
    autoCommit = false
    connectionTimeoutMs = 30000
    validationTimeoutMs = 5000
  }
}
